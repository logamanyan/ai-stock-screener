<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Watchlist | ScreenerAI Pro</title>
    <link rel="stylesheet" href="style.css?v=pro">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="app-shell">
    <header class="header">
        <div class="brand">
            <div class="logo-sq"></div>
            <span class="brand-text">ScreenerAI</span>
            <span class="version-badge">PRO</span>
        </div>
        <div class="nav-group">
            <button class="nav-btn" onclick="window.location.href='index.html'">🏠 <span>Home</span></button>
            <button class="nav-btn active">⭐ <span>Watchlist</span></button>
            <button class="nav-btn" onclick="window.location.href='portfolio.html'">💼 <span>Portfolio</span></button>
        </div>
    </header>

    <main class="main-content">
        <section class="results-section">
            <div class="section-header">
                <h2 class="section-title">Pinned Stocks</h2>
                <div id="watchlistSummary" class="status-pill" style="background: var(--bg-elevated); border: 1px solid var(--border);">
                    Loading watchlist...
                </div>
            </div>

            <div id="watchlistList" class="results-grid">
                <!-- Watchlist items will be injected here -->
                <div class="loader-container" id="watchlistLoader">
                    <div class="loader"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="watchlist.js"></script>
</body>
</html>
